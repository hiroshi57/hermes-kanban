<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── SEO / SNS ──────────────────────────────────────────────── -->
    <title>TaskZen — AIカンバンボードで仕事を整える</title>
    <meta name="description"
      content="ドラッグ&ドロップで操作できる日本語AIカンバンボード。複数ボード・クラウド自動保存・ダークモード・リアルタイム同期対応。" />
    <meta name="theme-color" content="#6366f1" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="TaskZen — AIカンバンボードで仕事を整える" />
    <meta property="og:description"
      content="ドラッグ&ドロップで操作できる日本語AIカンバンボード。クラウド保存・ダークモード対応。" />
    <meta property="og:locale" content="ja_JP" />

    <!-- ── アイコン ────────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ── パフォーマンス: preconnect ─────────────────────────────── -->
    <!-- Google OAuth リダイレクト先 -->
    <link rel="preconnect" href="https://accounts.google.com" crossorigin />
    <link rel="dns-prefetch" href="https://accounts.google.com" />
    <!-- Google ユーザーコンテンツ（アバター画像） -->
    <link rel="preconnect" href="https://lh3.googleusercontent.com" crossorigin />
    <link rel="dns-prefetch" href="https://lh3.googleusercontent.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
