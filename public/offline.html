<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>オフライン — Hermes Kanban</title>
  <meta name="theme-color" content="#6366f1" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f1f5f9;
      color: #334155;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0d0f14; color: #cbd5e1; }
      .card { background: #1e293b; border-color: #334155; }
      .title { color: #f1f5f9; }
      .retry { background: #6366f1; }
      .retry:hover { background: #4f46e5; }
    }
    .card {
      max-width: 360px;
      width: calc(100% - 2rem);
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 1.25rem;
      padding: 2.5rem 2rem;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }
    .icon { font-size: 3rem; margin-bottom: 1.25rem; }
    .title {
      font-size: 1.125rem;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: .5rem;
    }
    .desc {
      font-size: .875rem;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 1.75rem;
    }
    .retry {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .6rem 1.5rem;
      background: #6366f1;
      color: #fff;
      font-size: .875rem;
      font-weight: 600;
      border: none;
      border-radius: .75rem;
      cursor: pointer;
      text-decoration: none;
      transition: background .15s;
    }
    .retry:hover { background: #4f46e5; }
    .note {
      margin-top: 1.25rem;
      font-size: .75rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <p class="title">オフラインです</p>
    <p class="desc">
      インターネット接続がありません。<br>
      ローカルに保存されたボードは引き続き<br>閲覧・編集できます。
    </p>
    <button class="retry" onclick="location.reload()">
      ↺ 再接続を試みる
    </button>
    <p class="note">接続が戻り次第、自動的に同期されます</p>
  </div>
</body>
</html>
